<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Type — Metric HUD</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card card--ink" style="--fg:#F4F6FA; --fg-3:#8A93A4">
  <div class="row" style="gap:36px; align-items:flex-end">
    <div class="col" style="gap:4px">
      <div class="wv-metric" style="color:var(--wv-coral-500)">3,42</div>
      <div class="wv-metric-label">км</div>
    </div>
    <div class="col" style="gap:4px">
      <div class="wv-metric">00:42:18</div>
      <div class="wv-metric-label">время</div>
    </div>
    <div class="col" style="gap:4px">
      <div class="wv-metric">4,9</div>
      <div class="wv-metric-label">км/ч</div>
    </div>
    <div class="col" style="gap:4px">
      <div class="wv-metric">7</div>
      <div class="wv-metric-label">точек</div>
    </div>
  </div>
  <div class="mono" style="color:#8A93A4; border-top:1px solid rgba(255,255,255,.1); padding-top:10px">
    Recording HUD — Display 44px, tabular nums, coral primary on dark.
  </div>
</div>
</body></html>
