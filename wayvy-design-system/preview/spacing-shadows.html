<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:18px; padding:14px 4px 22px; }
  .tile { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box  { width:96px; height:64px; background:#FFFFFF; border-radius:14px; border:1px solid var(--border); }
  .lbl  { font: 700 11px var(--font-sans); color: var(--fg); }
  .tok  { font: 500 10px var(--font-mono); color: var(--fg-3); text-align:center; }
  .s1 { box-shadow: 0 1px 2px rgba(14,17,22,.04), 0 1px 1px rgba(14,17,22,.03); }
  .s2 { box-shadow: 0 4px 12px rgba(14,17,22,.06), 0 1px 2px rgba(14,17,22,.04); }
  .s3 { box-shadow: 0 12px 28px rgba(14,17,22,.10), 0 2px 6px rgba(14,17,22,.05); }
  .sp { box-shadow: 0 2px 6px rgba(14,17,22,.22), 0 1px 2px rgba(14,17,22,.12); }
</style></head>
<body>
<div class="card card--surface card--tight">
  <div class="wv-eyebrow">Shadow elevation</div>
  <div class="grid">
    <div class="tile"><div class="box s1"></div><div class="lbl">shadow-1</div><div class="tok">hairline · row hover</div></div>
    <div class="tile"><div class="box s2"></div><div class="lbl">shadow-2</div><div class="tok">cards · sheets</div></div>
    <div class="tile"><div class="box s3"></div><div class="lbl">shadow-3</div><div class="tok">popovers · menus</div></div>
    <div class="tile"><div class="box sp"></div><div class="lbl">shadow-pin</div><div class="tok">map pins (always-on)</div></div>
  </div>
  <div class="wv-secondary" style="font-size:12px">Soft, layered, never dramatic. Map UI floats — it doesn't ground.</div>
</div>
</body></html>
