<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Stop confirm sheet</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: linear-gradient(180deg, #1F232C 0%, #0E1116 100%); padding: 0; }
  .card { background: transparent; padding: 16px; color:#F4F6FA; }
  .sheet {
    max-width: 400px; margin: 0 auto;
    background: #16191F; border-radius: 24px;
    padding: 8px 18px 18px; color:#F4F6FA;
    box-shadow: 0 16px 36px rgba(0,0,0,.45);
  }
  .grip { width:36px; height:5px; border-radius:999px; background:rgba(255,255,255,.22); margin: 6px auto 14px; }
  .h { font:700 20px var(--font-display); letter-spacing:-0.01em; margin:0; }
  .sub { font:500 13px var(--font-sans); color:#8A93A4; margin:4px 0 12px; }
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:rgba(255,255,255,.06); border-radius:14px; overflow:hidden; margin-bottom:14px; }
  .cell { background:#16191F; padding:9px 8px; text-align:center; }
  .v { font:700 18px var(--font-display); color:#F4F6FA; font-variant-numeric:tabular-nums; }
  .v .u { font:600 10px var(--font-sans); color:#8A93A4; margin-left:2px; }
  .l { font:500 10px var(--font-sans); color:#8A93A4; margin-top:2px; }
  .btn { display:block; width:100%; padding:12px; border-radius:13px; border:none; box-sizing:border-box; font:700 14px var(--font-sans); cursor:pointer; margin-bottom:6px; }
  .save { background:#FF5A4E; color:#fff; box-shadow:0 4px 14px rgba(255,90,78,.4); }
  .resume { background:rgba(255,255,255,.06); color:#F4F6FA; }
  .discard { background:transparent; color:#E5484D; border:1px solid rgba(229,72,77,.32); }
</style></head>
<body>
<div class="card">
  <div class="sheet">
    <div class="grip"></div>
    <h3 class="h">Завершить маршрут?</h3>
    <div class="sub">Ты прошёл 3,42 км за 42:18. Точек: 7.</div>
    <div class="stats">
      <div class="cell"><div class="v">3,42<span class="u">км</span></div><div class="l">дистанция</div></div>
      <div class="cell"><div class="v">42:18</div><div class="l">время</div></div>
      <div class="cell"><div class="v">4,9<span class="u">км/ч</span></div><div class="l">темп</div></div>
    </div>
    <button class="btn save">Сохранить маршрут</button>
    <button class="btn resume">Продолжить запись</button>
    <button class="btn discard">Удалить запись</button>
  </div>
</div>
</body></html>
