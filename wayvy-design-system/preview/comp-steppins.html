<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Step pins (route walk-through)</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background:
    radial-gradient(circle at 25% 30%, #2A2F3A 0 1px, transparent 1.5px),
    radial-gradient(circle at 75% 65%, #2A2F3A 0 1px, transparent 1.5px),
    linear-gradient(180deg, #16191F 0%, #0E1116 100%);
    padding:0;
  }
  .card { background: transparent; padding: 22px 24px 14px; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:24px; }
  .col { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .pin-wrap { position:relative; filter: drop-shadow(0 4px 6px rgba(14,17,22,.35)); width: 54px; height: 54px; display:flex; align-items:center; justify-content:center; }
  .pin { border-radius: 999px; display:flex; align-items:center; justify-content:center; box-sizing:border-box; }
  .past { width:32px; height:32px; background:#14B8C7; border:2.5px solid #fff; opacity:.78; color:#fff; }
  .curr { width:44px; height:44px; background:#FF5A4E; border:3px solid #fff; color:#fff; }
  .fut  { width:32px; height:32px; background:#16191F; border:2.5px solid #14B8C7; color:#14B8C7; opacity:.85; }
  .num  { font:800 14px var(--font-sans); letter-spacing:-0.01em; }
  .lbl  { font:700 11px var(--font-sans); color:#F4F6FA; }
  .tok  { font:500 10px var(--font-mono); color:#8A93A4; text-align:center; line-height:1.3; }
  .pulse { position:absolute; inset:0; border-radius:999px; background:rgba(255,90,78,.22); animation: wv-pulse 1.8s ease-out infinite; z-index:-1; }
  @keyframes wv-pulse { 0% {transform:scale(.8); opacity:.5} 70%, 100% {transform:scale(1.6); opacity:0} }
</style></head>
<body>
<div class="card">
  <div class="grid">
    <div class="col">
      <div class="pin-wrap">
        <div class="pin past"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 5 5 9-11"/></svg></div>
      </div>
      <div class="lbl">Прошли</div>
      <div class="tok">teal · check · 32pt</div>
    </div>
    <div class="col">
      <div class="pin-wrap">
        <div class="pulse"></div>
        <div class="pin curr"><span class="num">2</span></div>
      </div>
      <div class="lbl">Текущий шаг</div>
      <div class="tok">coral · pulse · 44pt</div>
    </div>
    <div class="col">
      <div class="pin-wrap">
        <div class="pin fut"><span class="num" style="font-size:13px">3</span></div>
      </div>
      <div class="lbl">Впереди</div>
      <div class="tok">outlined teal · 32pt</div>
    </div>
  </div>
</div>
</body></html>
