<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display:grid; grid-template-columns:repeat(7,1fr); gap:12px; }
  .tile { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .box  { width:72px; height:72px; background:linear-gradient(160deg, var(--wv-coral-400), var(--wv-coral-500)); }
  .lbl  { font: 700 11px var(--font-sans); color: var(--fg); }
  .tok  { font: 500 10px var(--font-mono); color: var(--fg-3); }
</style></head>
<body>
<div class="card card--surface card--tight">
  <div class="wv-eyebrow">Radii</div>
  <div class="grid">
    <div class="tile"><div class="box" style="border-radius:4px"></div><div class="lbl">xs</div><div class="tok">4</div></div>
    <div class="tile"><div class="box" style="border-radius:8px"></div><div class="lbl">sm</div><div class="tok">8</div></div>
    <div class="tile"><div class="box" style="border-radius:12px"></div><div class="lbl">md</div><div class="tok">12</div></div>
    <div class="tile"><div class="box" style="border-radius:16px"></div><div class="lbl">lg</div><div class="tok">16</div></div>
    <div class="tile"><div class="box" style="border-radius:20px"></div><div class="lbl">xl</div><div class="tok">20</div></div>
    <div class="tile"><div class="box" style="border-radius:28px"></div><div class="lbl">2xl</div><div class="tok">28 · sheets</div></div>
    <div class="tile"><div class="box" style="border-radius:999px"></div><div class="lbl">pill</div><div class="tok">999</div></div>
  </div>
</div>
</body></html>
