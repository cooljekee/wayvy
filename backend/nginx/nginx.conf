events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;   # stricter for SMS OTP endpoints

    # Security headers for all responses
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options         "DENY"    always;

    upstream user_service {
        server user-service:8081;
    }

    upstream route_service {
        server route-service:8082;
    }

    upstream event_service {
        server event-service:8083;
    }

    upstream media_service {
        server media-service:8084;
    }

    server {
        listen 80;

        default_type application/json;

        location /health {
            default_type text/plain;
            return 200 'ok';
        }

        # JSON error body when auth_request returns 401
        error_page 401 = @unauthorized;
        location @unauthorized {
            return 401 '{"error":"unauthorized","code":"UNAUTHORIZED"}';
        }

        # Internal subrequest: validate JWT, get X-User-ID back.
        # Only reachable by Nginx auth_request — not forwarded externally.
        location = /auth/validate {
            internal;
            proxy_pass             http://user_service/auth/validate;
            proxy_pass_request_body off;
            proxy_set_header       Content-Length  "";
            proxy_set_header       Authorization   $http_authorization;
            proxy_set_header       Host            $proxy_host;
            proxy_connect_timeout  3s;
            proxy_read_timeout     5s;
        }

        # Auth endpoints — no JWT required (phone OTP flow)
        location /auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass             http://user_service;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $proxy_host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
        }

        # User search — public, no JWT (longest prefix wins over /users/ below)
        location /users/search {
            limit_req zone=api burst=20 nodelay;
            proxy_pass             http://user_service;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $proxy_host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
        }

        # User endpoints — JWT required; Nginx validates and injects X-User-ID
        location /users/ {
            auth_request      /auth/validate;
            auth_request_set  $x_user_id $upstream_http_x_user_id;

            limit_req zone=api burst=20 nodelay;
            proxy_pass             http://user_service;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $proxy_host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-User-ID         $x_user_id;
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
        }

        # Routes — JWT required; Nginx validates and injects X-User-ID
        location /routes/ {
            auth_request      /auth/validate;
            auth_request_set  $x_user_id $upstream_http_x_user_id;

            limit_req zone=api burst=20 nodelay;
            proxy_pass             http://route_service;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $proxy_host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-User-ID         $x_user_id;
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
        }

        # Waypoints — JWT required; same pattern as /routes/
        location /waypoints/ {
            auth_request      /auth/validate;
            auth_request_set  $x_user_id $upstream_http_x_user_id;

            limit_req zone=api burst=20 nodelay;
            proxy_pass             http://route_service;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $proxy_host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-User-ID         $x_user_id;
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
        }

        # Events — JWT required; Nginx validates and injects X-User-ID
        location /events/ {
            auth_request      /auth/validate;
            auth_request_set  $x_user_id $upstream_http_x_user_id;

            limit_req zone=api burst=20 nodelay;
            proxy_pass             http://event_service;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $proxy_host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header       X-User-ID         $x_user_id;
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
        }

        # Media uploads — no JWT required (iOS uploads after receiving r2_key)
        location /media/ {
            limit_req zone=api burst=5 nodelay;
            proxy_pass             http://media_service;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $proxy_host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout  5s;
            proxy_read_timeout     60s;
            client_max_body_size   11m;
        }
    }
}
