events {
    worker_connections 1024;
}

http {
    server_tokens off;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api:10m  rate=60r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;   # stricter for SMS OTP endpoints

    # Security headers for all responses
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options         "DENY"    always;

    upstream user_service {
        server user-service:8081;
    }

    server {
        listen 80;

        default_type application/json;

        location /health {
            default_type text/plain;
            return 200 'ok';
        }

        # Auth endpoints — no JWT required (phone OTP flow)
        # TODO(phase-2): add JWT validation + X-User-ID injection for /users/ and other protected paths
        location /auth/ {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass             http://user_service;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $proxy_host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
        }

        # User endpoints — JWT validation deferred to phase 2
        location /users/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass             http://user_service;
            proxy_http_version     1.1;
            proxy_set_header       Connection        "";
            proxy_set_header       Host              $proxy_host;
            proxy_set_header       X-Real-IP         $remote_addr;
            proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout  5s;
            proxy_read_timeout     30s;
        }

        # Stubs for future services
        location /routes/ {
            limit_req zone=api burst=20 nodelay;
            # proxy_pass http://route_service;  # uncomment in phase 3
            return 503 '{"error":"not yet implemented","code":"NOT_IMPLEMENTED"}';
        }

        location /waypoints/ {
            limit_req zone=api burst=20 nodelay;
            # proxy_pass http://route_service;  # uncomment in phase 3
            return 503 '{"error":"not yet implemented","code":"NOT_IMPLEMENTED"}';
        }

        location /events/ {
            limit_req zone=api burst=20 nodelay;
            # proxy_pass http://event_service;  # uncomment in phase 6
            return 503 '{"error":"not yet implemented","code":"NOT_IMPLEMENTED"}';
        }

        location /media/ {
            limit_req zone=api burst=5 nodelay;
            # proxy_pass http://media_service;  # uncomment in phase 4
            return 503 '{"error":"not yet implemented","code":"NOT_IMPLEMENTED"}';
        }
    }
}
