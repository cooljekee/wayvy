services:
  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wayvy}
      POSTGRES_USER: ${POSTGRES_USER:-wayvy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wayvy}
    ports:
      - "5432:5432"  # local dev only — remove in prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wayvy"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"  # local dev only — remove in prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  route-service:
    build: ./route-service
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-wayvy}:${POSTGRES_PASSWORD:-wayvy}@postgres:5432/${POSTGRES_DB:-wayvy}?sslmode=disable
      PORT: "8082"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      user-service:
        condition: service_healthy
      route-service:
        condition: service_healthy

  user-service:
    build: ./user-service
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-wayvy}:${POSTGRES_PASSWORD:-wayvy}@postgres:5432/${POSTGRES_DB:-wayvy}?sslmode=disable
      REDIS_ADDR: redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SMSAERO_EMAIL: ${SMSAERO_EMAIL}
      SMSAERO_API_KEY: ${SMSAERO_API_KEY}
      SMSAERO_API_KEY_TEST: ${SMSAERO_API_KEY_TEST}
      PORT: "8081"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
