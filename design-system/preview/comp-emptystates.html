<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Empty states</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--bg); }
  .card { padding: 14px; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap:12px; }
  .col { display:flex; flex-direction:column; align-items:center; text-align:center; gap:8px; padding: 16px 12px; background: var(--surface); border:1px solid var(--border); border-radius: 16px; }
  .ill { width:72px; height:72px; border-radius:22px; background: rgba(255,90,78,0.10); display:flex; align-items:center; justify-content:center; }
  .ttl { font:700 14px var(--font-display); letter-spacing:-0.01em; color:var(--fg); }
  .body { font:500 11px var(--font-sans); color:var(--fg-3); line-height:1.4; }
  .cta { font:700 11px var(--font-sans); color:#fff; background:var(--wv-coral-500); padding:6px 12px; border-radius:8px; }
</style></head>
<body>
<div class="card">
  <div class="grid">
    <div class="col">
      <div class="ill">
        <svg width="44" height="44" viewBox="0 0 64 64" fill="none">
          <path d="M14 50 C 20 38, 30 38, 36 30 S 50 18, 52 12" stroke="#FF5A4E" stroke-width="3" stroke-linecap="round" stroke-dasharray="2 5"/>
          <circle cx="14" cy="50" r="4.5" fill="#FF5A4E"/>
          <path d="M52 12 L48 18 L56 18 Z" fill="#FF5A4E"/>
        </svg>
      </div>
      <div class="ttl">Пока ни одного маршрута</div>
      <div class="body">Запиши первую прогулку — она появится здесь.</div>
      <div class="cta">Записать первый маршрут</div>
    </div>
    <div class="col">
      <div class="ill">
        <svg width="44" height="44" viewBox="0 0 64 64" fill="none">
          <rect x="10" y="14" width="44" height="42" rx="7" stroke="#FF5A4E" stroke-width="2.5"/>
          <path d="M10 26 L54 26" stroke="#FF5A4E" stroke-width="2.5"/>
          <path d="M22 8 L22 18 M42 8 L42 18" stroke="#FF5A4E" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="22" cy="40" r="2.6" fill="#FF5A4E"/>
          <circle cx="32" cy="40" r="2.6" fill="#FF5A4E" opacity=".4"/>
          <circle cx="42" cy="40" r="2.6" fill="#FF5A4E" opacity=".4"/>
        </svg>
      </div>
      <div class="ttl">Ничего на этой неделе</div>
      <div class="body">Подпишись или создай первое событие.</div>
      <div class="cta">Создать событие</div>
    </div>
    <div class="col">
      <div class="ill">
        <svg width="44" height="44" viewBox="0 0 64 64" fill="none">
          <circle cx="24" cy="22" r="7" stroke="#FF5A4E" stroke-width="2.5"/>
          <path d="M10 50 C 10 40, 17 36, 24 36 C 31 36, 38 40, 38 50" stroke="#FF5A4E" stroke-width="2.5" stroke-linecap="round"/>
          <circle cx="44" cy="26" r="5.5" stroke="#FF5A4E" stroke-width="2.5" opacity=".4"/>
          <path d="M36 46 C 36 40, 44 38, 50 38 C 54 38, 58 40, 58 46" stroke="#FF5A4E" stroke-width="2.5" stroke-linecap="round" opacity=".4"/>
        </svg>
      </div>
      <div class="ttl">Ни на кого не подписан</div>
      <div class="body">Найди друзей — увидишь их маршруты.</div>
      <div class="cta">Найти друзей</div>
    </div>
  </div>
</div>
</body></html>
