<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>App icon</title>
<link rel="stylesheet" href="_card.css">
<style>
  .card { display:flex; align-items:center; gap:30px; padding:20px; }
  .icon-stage { background: linear-gradient(180deg, #B9ECF0 0%, #FFE7BA 100%); padding:24px; border-radius:22px; box-shadow: var(--shadow-2); }
  .row { display:flex; gap:14px; align-items:flex-end; }
  .ic { box-shadow: var(--shadow-2); display: block; }
  .ic-lg { width:128px; height:128px; border-radius:28px; box-shadow: var(--shadow-3); }
  .ic-84 { width:84px; height:84px; border-radius:19px; }
  .ic-60 { width:60px; height:60px; border-radius:14px; }
  .ic-40 { width:40px; height:40px; border-radius:9px; }
  .ic-29 { width:29px; height:29px; border-radius:7px; }
  .cap { font:500 10px var(--font-mono); color:var(--fg-3); margin-top:6px; text-align:center; }
  .col { display:flex; flex-direction:column; align-items:center; }
</style></head>
<body>
<div class="card card--surface">
  <div class="icon-stage">
    <img class="ic-lg" src="../assets/wayvy-app-icon.svg" alt="Wayvy app icon"/>
  </div>
  <div class="col" style="gap:14px; align-items:flex-start">
    <div class="row">
      <div class="col"><img class="ic ic-84" src="../assets/wayvy-app-icon.svg"/><div class="cap">84pt</div></div>
      <div class="col"><img class="ic ic-60" src="../assets/wayvy-app-icon.svg"/><div class="cap">60pt</div></div>
      <div class="col"><img class="ic ic-40" src="../assets/wayvy-app-icon.svg"/><div class="cap">40pt</div></div>
      <div class="col"><img class="ic ic-29" src="../assets/wayvy-app-icon.svg"/><div class="cap">29pt</div></div>
    </div>
    <div class="wv-secondary" style="font-size:13px; max-width:320px">
      iOS rounded square, coral field. Волна-монограмма из имени бренда — две сплошные волны с круглыми торцами. Читается до 29pt (Settings).
    </div>
  </div>
</div>
</body></html>
