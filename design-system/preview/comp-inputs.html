<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  .field { display:flex; flex-direction:column; gap:6px; }
  .label { font:600 12px var(--font-sans); color:var(--fg-2); letter-spacing:.01em; }
  .input { font:500 15px var(--font-sans); color:var(--fg); padding:13px 14px; background:var(--surface); border:1px solid var(--border-strong); border-radius:14px; outline:none; }
  .input:focus { border-color:var(--wv-coral-500); box-shadow: 0 0 0 3px rgba(255,90,78,.18); }
  .input::placeholder { color:var(--fg-4); }
  .search { display:flex; align-items:center; gap:10px; padding:11px 14px; background:var(--surface); border:1px solid var(--border-strong); border-radius:14px; }
  .search input { flex:1; border:none; outline:none; font:500 15px var(--font-sans); color:var(--fg); background:transparent; }
  .row3 { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
  .seg { display:inline-flex; background:var(--surface-3); border-radius:12px; padding:3px; gap:2px; }
  .seg button { font:600 13px var(--font-sans); padding:7px 14px; border-radius:10px; border:none; background:transparent; color:var(--fg-2); cursor:pointer;}
  .seg button[aria-selected="true"] { background:var(--surface); color:var(--fg); box-shadow: var(--shadow-1); }
</style></head>
<body>
<div class="card card--surface card--tight">
  <div class="wv-eyebrow">Inputs</div>
  <div class="row3">
    <div class="field">
      <div class="label">Название точки</div>
      <input class="input" value="Самокатная кофейня"/>
    </div>
    <div class="field">
      <div class="label">Город</div>
      <input class="input" placeholder="Москва"/>
    </div>
  </div>
  <div class="search">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" style="color:var(--fg-3)"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
    <input placeholder="Найти место рядом..."/>
  </div>
  <div class="seg" role="tablist" aria-label="visibility">
    <button aria-selected="true">Публичный</button>
    <button>Подписчики</button>
    <button>Приватный</button>
  </div>
</div>
</body></html>
