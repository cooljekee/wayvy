<!doctype html>
<html lang="en"><head><meta charset="utf-8"><title>Brand Accents</title>
<link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card card--surface">
  <div class="row" style="gap:20px">
    <div class="col" style="flex:1">
      <div class="sw sw--lg" style="background:var(--wv-coral-500); width:100%; height:88px"></div>
      <div class="wv-body-strong">Coral 500</div>
      <div class="mono">#FF5A4E · own routes · brand</div>
    </div>
    <div class="col" style="flex:1">
      <div class="sw sw--lg" style="background:var(--wv-teal-400); width:100%; height:88px"></div>
      <div class="wv-body-strong">Teal 400</div>
      <div class="mono">#14B8C7 · followed routes</div>
    </div>
    <div class="col" style="flex:1">
      <div class="sw sw--lg" style="background:var(--wv-amber-400); width:100%; height:88px"></div>
      <div class="wv-body-strong">Amber 400</div>
      <div class="mono">#F4B740 · events</div>
    </div>
  </div>
  <div class="wv-secondary" style="border-top:1px solid var(--divider); padding-top:10px">
    Three brand hues, one per MapPin variant. Tuned for legibility on both light and dark Yandex tiles.
  </div>
</div>
</body></html>
